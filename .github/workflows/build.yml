name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.find.outputs.versions }}
      latest: ${{ steps.find.outputs.latest }}
    steps:
      - uses: actions/checkout@v6

      - name: Find version directories
        id: find
        run: |
          versions=$(find . -maxdepth 2 -name Dockerfile \
            | xargs -I{} dirname {} \
            | sed 's|^\./||' \
            | sort -V \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          latest=$(echo "$versions" | jq -r '.[-1]')
          echo "versions=$versions" >> $GITHUB_OUTPUT
          echo "latest=$latest" >> $GITHUB_OUTPUT

  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.discover.outputs.versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/trankimtung/unbound-container
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.version == needs.discover.outputs.latest }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,scope=${{ matrix.version }},mode=max
