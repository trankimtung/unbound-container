server:

    ############
    # Threading
    ############

    num-threads: 4

    #############
    # Interfaces
    #############

    interface: 0.0.0.0@${UNBOUND_PORT}
    interface: ::0@${UNBOUND_PORT}
    port: ${UNBOUND_PORT}

    prefer-ip4: yes
    prefer-ip6: no

    #################
    # Socket options
    #################

    outgoing-range: 4096
    outgoing-num-tcp: 10
    incoming-num-tcp: 10
    so-rcvbuf: 4m
    so-sndbuf: 4m
    so-reuseport: yes
    stream-wait-size: 4m
    edns-buffer-size: 1232

    # Connect UDP sockets to mitigate ICMP side-channel attacks.
    udp-connect: yes

    # Drop UDP queries that have been sitting in the socket buffer for
    # more than 3 seconds — avoids processing stale queries under load.
    sock-queue-timeout: 3

    ############
    # Protocols
    ############

    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    #########
    # Caches
    #
    # rrset-cache-size should be ~2x msg-cache-size.
    # Slabs must be a power of 2, ideally equal to num-threads.
    #########

    msg-cache-size: 8m
    msg-cache-slabs: 4
    key-cache-size: 8m
    key-cache-slabs: 4
    rrset-cache-size: 16m
    rrset-cache-slabs: 4
    neg-cache-size: 2m
    infra-cache-numhosts: 20000
    infra-cache-min-rtt: 50
    infra-keep-probing: yes

    cache-min-ttl: 300
    cache-max-ttl: 86400

    ###########################
    # Serve stale (RFC 8767)
    #
    # Try to refresh expired entries before responding, but fall back
    # to stale data after 1.8s to avoid blocking the client.
    ###########################

    serve-expired: yes
    serve-expired-ttl: 86400
    serve-expired-client-timeout: 1800

    ################
    # Query options
    ################

    num-queries-per-thread: 2048
    prefetch: yes
    prefetch-key: yes
    rrset-roundrobin: yes
    minimal-responses: yes
    deny-any: yes

    # Under extreme load, allow 50% of queries to time out so the other
    # 50% can complete rather than all queries starving together.
    jostle-timeout: 200

    # Prefer the N fastest upstream servers for 90% of queries.
    fast-server-permil: 900
    fast-server-num: 3

    # Limit outgoing recursion to 1000 QPS per zone to protect against
    # being used in a recursion-based amplification attack.
    ratelimit: 0

    do-not-query-localhost: yes

    ################
    # Access control
    ################

    access-control: 0.0.0.0/0 refuse
    access-control: ::0/0 refuse
    access-control: 127.0.0.1/32 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: fc00::/7 allow

    interface-action: 0.0.0.0@${UNBOUND_PORT} allow
    interface-action: ::0@${UNBOUND_PORT} allow

    ##########################
    # DNS rebinding protection
    ##########################

    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fc00::/7

    unwanted-reply-threshold: 10000

    #######################
    # Privilege / chroot
    #######################
    
    # Disable chroot and dropping privileges.
    # Unbound will run as a non-root user by default in the container.
    chroot: ""
    username: ""

    directory: "/opt/unbound/etc/unbound"

    #########
    # Logging
    #########

    val-log-level: 0
    verbosity: 1

    logfile: ""
    log-time-ascii: yes
    log-queries: no
    log-replies: no
    log-destaddr: no
    log-servfail: yes
    pidfile: "/opt/unbound/etc/unbound/unbound.pid"

    ######################
    # Privacy
    ######################

    hide-identity: yes
    hide-version: yes
    hide-trustanchor: yes
    hide-http-user-agent: yes
    identity: "dns"
    http-user-agent: "dns"
    qname-minimisation: yes

    ###################
    # Security hardening
    ###################

    harden-short-bufsize: yes
    harden-large-queries: yes
    harden-glue: yes
    harden-unverified-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: no
    harden-algo-downgrade: yes
    harden-unknown-additional: yes
    aggressive-nsec: yes
    use-caps-for-id: no

    # Strip unsigned records from the additional section of DNSSEC-validated
    # responses to prevent data leakage from insecure zones.
    val-clean-additional: yes

    auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"

    # DNS Cookies (RFC 7873 / RFC 9018): lightweight anti-spoofing and
    # anti-amplification for UDP clients that support them.
    answer-cookie: yes

    ##############################
    # Extended DNS Errors (RFC 8914)
    ##############################

    ede: yes
    ede-serve-expired: yes

remote-control:
    control-enable: no
